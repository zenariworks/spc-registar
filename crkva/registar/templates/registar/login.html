{% load static %}
{% load compress %}
<!DOCTYPE html>
<html lang="sr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#A21514">
    <script>
      // Apply saved theme as early as possible to avoid flash.
      // Valid themes: 'light' (default, no attr) | 'sepia' | 'dark'.
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          if (saved && saved !== 'light') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&family=PT+Serif:wght@400;700&family=JetBrains+Mono:wght@400;500&&subset=cyrillic,cyrillic-ext,latin&display=swap" rel="stylesheet">
    {% compress css %}
      <link rel="stylesheet" href="{% static 'registar/base/fonts.css' %}">
      <link rel="stylesheet" href="{% static 'registar/base/tokens.css' %}">
      <link rel="stylesheet" href="{% static 'registar/pages/prijava.css' %}">
      <link rel="stylesheet" href="{% static 'registar/themes/sepia.css' %}">
      <link rel="stylesheet" href="{% static 'registar/themes/tamna.css' %}">
    {% endcompress %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="{% static 'registar/favicon.png' %}" type="image/x-icon">
    <title>Пријава — Црквени регистар</title>
  </head>
  <body class="login-page">
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-church login-header__icon"></i>
        <h1>Црквени регистар</h1>
        <p class="login-header__subtitle">Пријавите се на свој налог</p>
      </div>

      {% if form.errors %}
      <div class="login-errors">
        <i class="fas fa-exclamation-circle"></i>
        Погрешно корисничко име или лозинка.
      </div>
      {% endif %}

      <form method="post" class="login-form" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label for="id_username">Корисничко име</label>
          <input type="text" name="username" id="id_username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required>
        </div>
        <div class="form-group">
          <label for="id_password">Лозинка</label>
          <input type="password" name="password" id="id_password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-button">
          <i class="fas fa-sign-in-alt"></i> Пријава
        </button>
        <input type="hidden" name="next" value="{{ next }}">
      </form>
    </div>
  </body>
</html>
