default_stages: [pre-commit, manual]
default_install_hook_types: [pre-commit, commit-msg]
repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
        - id: trailing-whitespace
        - id: end-of-file-fixer
        - id: check-json
        - id: check-added-large-files
          args: ['--maxkb=1000']
        - id: check-case-conflict
        - id: check-merge-conflict
        - id: requirements-txt-fixer

  # Python code formatting and linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Linter
      - id: ruff
        args: ["--fix", "--unsafe-fixes", "--exit-non-zero-on-fix"]
      # Formatter
      - id: ruff-format

  # Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Remove unused imports and variables
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-all-unused-imports
          - --remove-unused-variables
          - --expand-star-imports
          - --ignore-init-module-imports

  # Pylint for Pythonic code checks
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
        args:
          - --rcfile=.pylintrc
          - --django-settings-module=crkva.settings
        exclude: ^(.*/migrations/.*|scripts/gunicorn\.conf\.py)$

  # Django tests
  - repo: local
    hooks:
      - id: django-tests
        name: django tests
        entry: python crkva/manage.py test registar.tests tenants.tests --keepdb --parallel auto --verbosity=1
        language: system
        pass_filenames: false
        files: '\.py$'


  # Biome — CSS + JS linter. Catches CSS parse errors, duplicate selectors,
  # dead overrides, plus JS noConsoleLog / noDebugger / noVar / unused vars.
  - repo: local
    hooks:
      - id: biome
        name: biome lint (CSS + JS)
        entry: npx --no-install @biomejs/biome lint --no-errors-on-unmatched
        language: system
        files: ^crkva/registar/static/registar/.*\.(css|js)$
        exclude: \.min\.(css|js)$
        pass_filenames: true


  # djlint — django template lint (H021 catches inline styles + many more)
  - repo: https://github.com/djlint/djLint
    rev: v1.36.4
    hooks:
      - id: djlint-django
        files: \.html$


  # Inline-script debug guard — biome catches .js files; this catches inline
  # <script> blocks inside Django templates that biome cannot reach.
  - repo: local
    hooks:
      - id: no-inline-script-debug
        name: no console.log / debugger in inline template scripts
        language: pygrep
        entry: '(console\.(log|debug)\b|(^|[^a-zA-Z_])debugger\s*;)'
        files: \.html$

  # Validate commit message subject (feat: / fix: / refactor: / ...)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, refactor, docs, test, chore, ci, perf, style, build, revert]

  # Forbid ANY "Co-authored-by:" trailer in commit messages.
  - repo: local
    hooks:
      - id: no-coauthored-by
        name: no Co-authored-by trailer
        language: pygrep
        stages: [commit-msg]
        args: [--multiline]
        entry: '(?i)^[ \t]*co-authored-by:'

  # Catch multi-line Django {# ... #} comments. Django {# #} comments are
  # single-line only; a multi-line one is NOT treated as a comment and its
  # text leaks into the rendered page (regressed once in _view_actions.html).
  - repo: local
    hooks:
      - id: no-multiline-django-comment
        name: no multi-line Django {# #} comment
        language: pygrep
        entry: '{#(?![^\n]*#\})'
        files: \.html$
