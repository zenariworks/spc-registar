name: Tests

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege GITHUB_TOKEN (CodeQL: actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crkva_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: crkva_db
      DB_SCHEMA: public
      DB_USER: postgres
      DB_PASS: postgres
      STATIC_ROOT: ${{ github.workspace }}/.ci-static
      MEDIA_ROOT: ${{ github.workspace }}/.ci-media
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Prepare writable static/media roots
        run: mkdir -p "$STATIC_ROOT" "$MEDIA_ROOT"
      - name: Django system checks
        run: python crkva/manage.py check
      - name: Run test suite (with coverage)
        working-directory: crkva
        run: |
          coverage run --rcfile=../.coveragerc manage.py test registar.tests tenants.tests kalendar.tests --noinput --parallel 1
          # fail_under у .coveragerc обара CI ако покривеност падне испод прага (#303).
          coverage report --rcfile=../.coveragerc
      - name: Deploy checks (informational)
        run: python crkva/manage.py check --deploy || true
